; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = lvgl_tftespi_example

[env:exposeWifi]
platform = espressif32
board = freenove_esp32_s3_wroom
framework = arduino
build_flags = 
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
src_filter = -<*> +<exposeWifi/>

[env:timeInBrowserExample]
platform = espressif32
board = freenove_esp32_s3_wroom
framework = arduino
build_flags = 
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
src_filter = -<*> +<timeInBrowserExample/>

[env:webServerBetterUI]
platform = espressif32
board = freenove_esp32_s3_wroom
framework = arduino
board_build.filesystem = littlefs
build_flags = 
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
src_filter = -<*> +<webServerBetterUI/>

[env:barcodeScanner]
platform = espressif32
board = adafruit_feather_esp32s3
framework = arduino
build_flags = 
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
src_filter = -<*> +<barcodeScanner/>

[env:printerMaster]
platform = espressif32
board = lolin_c3_mini
; board = adafruit_feather_esp32s3
; board = freenove_esp32_s3_wroom
framework = arduino
monitor_speed = 115200
lib_deps = 
	h2zero/NimBLE-Arduino@^2.1.0
	adafruit/Adafruit GFX Library
   adafruit/Adafruit BusIO
	ricmoo/QRCode
	mathieucarbou/ESPAsyncWebServer @ ^3.1.5
	bblanchon/ArduinoJson @ ^6.21.0
board_build.filesystem = littlefs
build_flags = 
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
src_filter = -<*> +<printerMaster/>

[env:tft_espi_example]
platform = espressif32
board = esp32-s3-devkitm-1
; board = lolin_c3_mini
framework = arduino
monitor_speed = 115200
lib_deps = 
    bodmer/TFT_eSPI @ ^2.5.43
	;  lovyan03/LovyanGFX

; board_upload.flash_size = 4MB
; board_build.flash_size = 4MB

build_flags =
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D USER_SETUP_LOADED=1
  -D USE_HSPI_PORT=1
  -D ST7789_DRIVER=1
  -D TFT_RGB_ORDER=TFT_BGR
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=240
  -D LOAD_GLCD=1
  -D LOAD_FONT2=1
  -D LOAD_FONT4=1
  -D LOAD_FONT6=1
  -D LOAD_FONT7=1
  -D LOAD_FONT8=1
  -D LOAD_GFXFF=1
  -D SMOOTH_FONT=1
  -D TFT_MISO=13
  -D TFT_MOSI=11
  -D TFT_SCLK=12
  -D TFT_CS=10
  -D TFT_DC=6
  -D TFT_RST=7
src_filter = -<*> +<tft_espi_example/>

[env:lvgl_tftespi_example]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps = 
    bodmer/TFT_eSPI @ ^2.5.43
	 lvgl/lvgl @ 9.5.0
	 esp-arduino-libs/ESP32_Button @ 0.0.1

board_upload.flash_size = 4MB
board_build.flash_size = 4MB
board_build.partitions = default.csv

build_flags =
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D USER_SETUP_LOADED=1
  -D USE_HSPI_PORT=1
  -D ST7789_DRIVER=1
  -D TFT_RGB_ORDER=TFT_BGR
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=240
  -D LOAD_GLCD=1
  -D LOAD_FONT2=1
  -D LOAD_FONT4=1
  -D LOAD_FONT6=1
  -D LOAD_FONT7=1
  -D LOAD_FONT8=1
  -D LOAD_GFXFF=1
  -D SMOOTH_FONT=1
  -D TFT_SCLK=12
  -D TFT_MOSI=11
  -D TFT_RST=7
  -D TFT_DC=6
  -D TFT_CS=10
  -D LV_CONF_SKIP=1
  -D LV_COLOR_DEPTH=16
  -D LV_USE_LOG=1
  -D LV_FONT_MONTSERRAT_24=1
  -D LV_FONT_MONTSERRAT_32=1
src_filter = -<*> +<lvgl_tftespi_example/>