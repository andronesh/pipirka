<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>ESP32 Ambient</title>

		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" type="text/css" href="/style.css" />
	</head>

	<body>
		<div class="wrap">
			<div class="card">
				<div class="panel">
					<div class="title">Indoor climate</div>
					<div class="temp" id="temp">--.- °C</div>
					<div class="chip" id="press">----.- hPa</div>
					<div class="time" id="time">--:--:--</div>
					<div class="date" id="date"></div>
					<div class="footer">myhome.local • ESP32</div>
				</div>

				<div class="panel">
					<div class="title">Details</div>

					<div class="kv">
						<div class="k">Temperature</div>
						<div class="v" id="t2"></div>
					</div>
					<div class="kv">
						<div class="k">Pressure</div>
						<div class="v" id="p2"></div>
					</div>
					<div class="kv">
						<div class="k">Time</div>
						<div class="v" id="time2"></div>
					</div>
					<div class="kv">
						<div class="k">Date</div>
						<div class="v" id="date2"></div>
					</div>
				</div>
			</div>
		</div>

		<script>
			async function update() {
				try {
					const t = await (await fetch("/temp")).text();
					const p = await (await fetch("/press")).text();
					const ti = await (await fetch("/time")).text();
					const d = await (await fetch("/date")).text();

					temp.textContent = t;
					press.textContent = p;
					time.textContent = ti;
					date.textContent = d;

					t2.textContent = t;
					p2.textContent = p;
					time2.textContent = ti;
					date2.textContent = d;
				} catch (e) {}
			}
			update();
			setInterval(update, 1000);
		</script>
	</body>
</html>
